<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RavenQuest Legacy Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2?v=2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .subtitle {
            color: #a0c4ff;
            font-size: 1.1em;
        }
        
        .last-update {
            margin-top: 10px;
            font-size: 0.9em;
            color: #ccc;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .tab {
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .tab:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .tab.active {
            background: #4ecca3;
            color: #1a1a2e;
            border-color: #4ecca3;
        }
        
        .table-container {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: rgba(78, 204, 163, 0.2);
            padding: 15px;
            text-align: left;
            font-weight: bold;
            color: #4ecca3;
            border-bottom: 2px solid #4ecca3;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        tr:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .rank {
            font-weight: bold;
            font-size: 1.2em;
            color: #ffd700;
        }
        
        .name {
            font-weight: 600;
        }
        
        .level {
            color: #a0c4ff;
        }
        
        .exp {
            font-family: monospace;
            color: #fff;
        }
        
        .positive {
            color: #4ecca3;
            font-weight: bold;
        }
        
        .negative {
            color: #ff6b6b;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
        }
        
        .error {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }
        
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #4ecca3;
        }
        
        .stat-label {
            color: #a0c4ff;
            margin-top: 5px;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .tab { padding: 8px 16px; font-size: 0.9em; }
            th, td { padding: 8px; font-size: 0.9em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 RavenQuest Legacy</h1>
            <div class="subtitle">Leaderboard Tracker em Tempo Real</div>
            <div class="last-update">Última atualização: <span id="lastUpdate">Carregando...</span></div>
        </header>

        <div class="stats-summary" id="statsSummary">
            <!-- Estatísticas serão inseridas aqui -->
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('live')">📊 Ranking Atual</div>
            <div class="tab" onclick="switchTab('24h')">📈 Progressão 24h</div>
        </div>

        <div class="table-container">
            <div id="loading" class="loading">Carregando dados...</div>
            <div id="error" class="error" style="display: none;"></div>
            <table id="leaderboard" style="display: none;">
                <thead>
                    <tr id="tableHeader">
                        <th>Rank</th>
                        <th>Nome</th>
                        <th>Level</th>
                        <th>XP</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Dados serão inseridos aqui -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO - SUBSTITUA COM SUAS CREDENCIAIS
        const SUPABASE_URL = 'https://ovcnaewbnflacdgbgjld.supabase.co';
        const SUPABASE_KEY = 'SUA-CHAVE-ANON-AQUI'; // Use a anon public!

        // Cria cliente Supabase com nome diferente para evitar conflito
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentTab = 'live';
        let autoRefresh;

        function formatNumber(num) {
            if (num === null || num === undefined) return '-';
            if (num >= 1000000000) return (num/1000000000).toFixed(2) + 'B';
            if (num >= 1000000) return (num/1000000).toFixed(2) + 'M';
            if (num >= 1000) return (num/1000).toFixed(2) + 'K';
            return num.toLocaleString('pt-BR');
        }

        async function loadData() {
            showLoading();
            
            try {
                let data;
                
                if (currentTab === 'live') {
                    const { data: players, error } = await supabaseClient
                        .from('players')
                        .select('*')
                        .order('rank', { ascending: true });
                    
                    if (error) throw error;
                    data = players;
                } else {
                    // Calcula progressão 24h no cliente
                    const { data: current } = await supabaseClient
                        .from('players')
                        .select('*')
                        .order('rank', { ascending: true });
                    
                    const twentyFourHoursAgo = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
                    
                    const { data: oldData } = await supabaseClient
                        .from('history')
                        .select('*')
                        .lte('recorded_at', twentyFourHoursAgo)
                        .order('recorded_at', { ascending: false });
                    
                    const oldMap = {};
                    if (oldData) {
                        oldData.forEach(h => {
                            if (!oldMap[h.player_name]) {
                                oldMap[h.player_name] = h;
                            }
                        });
                    }
                    
                    data = current.map(p => {
                        const old = oldMap[p.name];
                        const oldExp = old ? old.exp : p.exp;
                        const gain = p.exp - oldExp;
                        return {
                            ...p,
                            exp_24h_gain: gain,
                            pct_24h: oldExp > 0 ? (gain / oldExp * 100) : 0
                        };
                    });
                }

                if (data && data.length > 0) {
                    renderTable(data);
                    updateStats(data);
                    updateTimestamp();
                } else {
                    showError('Nenhum dado encontrado. O scraper rodou recentemente?');
                }
                
            } catch (error) {
                console.error('Erro:', error);
                showError('Erro ao carregar dados: ' + error.message);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            
            if (currentTab === 'live') {
                document.getElementById('tableHeader').innerHTML = `
                    <th>Rank</th>
                    <th>Nome</th>
                    <th>Level</th>
                    <th>XP</th>
                `;
                
                tbody.innerHTML = data.map(p => `
                    <tr>
                        <td class="rank">#${p.rank}</td>
                        <td class="name">${p.name}</td>
                        <td class="level">Lv.${p.level}</td>
                        <td class="exp">${formatNumber(p.exp)}</td>
                    </tr>
                `).join('');
            } else {
                document.getElementById('tableHeader').innerHTML = `
                    <th>Rank</th>
                    <th>Nome</th>
                    <th>Level</th>
                    <th>XP Atual</th>
                    <th>Ganho 24h</th>
                    <th>% 24h</th>
                `;
                
                tbody.innerHTML = data.map(p => {
                    const gainClass = p.exp_24h_gain > 0 ? 'positive' : 'negative';
                    return `
                    <tr>
                        <td class="rank">#${p.rank}</td>
                        <td class="name">${p.name}</td>
                        <td class="level">Lv.${p.level}</td>
                        <td class="exp">${formatNumber(p.exp)}</td>
                        <td class="${gainClass}">${p.exp_24h_gain > 0 ? '+' : ''}${formatNumber(p.exp_24h_gain)}</td>
                        <td class="${gainClass}">${p.pct_24h > 0 ? '+' : ''}${p.pct_24h.toFixed(1)}%</td>
                    </tr>
                `}).join('');
            }
            
            showTable();
        }

        function updateStats(data) {
            const container = document.getElementById('statsSummary');
            
            if (currentTab === 'live') {
                const totalExp = data.reduce((sum, p) => sum + (p.exp || 0), 0);
                const avgLevel = data.reduce((sum, p) => sum + (p.level || 0), 0) / data.length;
                
                container.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">${data.length}</div>
                        <div class="stat-label">Jogadores</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${formatNumber(totalExp)}</div>
                        <div class="stat-label">XP Total</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${avgLevel.toFixed(1)}</div>
                        <div class="stat-label">Level Médio</div>
                    </div>
                `;
            } else {
                const totalGain = data.reduce((sum, p) => sum + (p.exp_24h_gain || 0), 0);
                const topGainer = data.reduce((max, p) => (p.exp_24h_gain || 0) > (max.exp_24h_gain || 0) ? p : max, data[0]);
                
                container.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">${formatNumber(totalGain)}</div>
                        <div class="stat-label">XP Ganho 24h</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${topGainer?.name || '-'}</div>
                        <div class="stat-label">Maior Ganhador</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${formatNumber(topGainer?.exp_24h_gain || 0)}</div>
                        <div class="stat-label">Recorde 24h</div>
                    </div>
                `;
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            loadData();
            clearInterval(autoRefresh);
            autoRefresh = setInterval(loadData, 300000);
        }

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('leaderboard').style.display = 'none';
            document.getElementById('error').style.display = 'none';
        }

        function showTable() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('leaderboard').style.display = 'table';
            document.getElementById('error').style.display = 'none';
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('leaderboard').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = msg;
        }

        function updateTimestamp() {
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('pt-BR');
        }

        // Inicializa
        loadData();
        autoRefresh = setInterval(loadData, 300000);
    </script>
</body>
</html>
